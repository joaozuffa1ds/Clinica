<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Pessoas</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:95%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#2196f3;
color:white;
}

button{
margin:10px;
padding:8px 15px;
background:#2196f3;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1976d2;
}

.excluir{
background:red;
}

</style>
</head>

<body>

<h2>Cadastro de Pessoas</h2>

<button onclick="adicionar()">Adicionar Pessoa</button>
<button onclick="ordenar()">Ordenar por Nome</button>
<button onclick="salvar()">Salvar</button>

<table id="tabela">

<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>CPF</th>
<th>RG</th>
<th>Observação</th>
<th>Ação</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<script>

let tabela = document.querySelector("#tabela tbody")

function adicionar(){

let linha=document.createElement("tr")

linha.innerHTML=`
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td><button class="excluir" onclick="excluir(this)">Excluir</button></td>
`

tabela.appendChild(linha)

}

function excluir(botao){

botao.parentElement.parentElement.remove()

}

function salvar(){

let dados=[]

document.querySelectorAll("#tabela tbody tr").forEach(linha=>{

let col=linha.querySelectorAll("td")

dados.push({
nome:col[0].innerText,
telefone:col[1].innerText,
cpf:col[2].innerText,
rg:col[3].innerText,
obs:col[4].innerText
})

})

localStorage.setItem("cadastro",JSON.stringify(dados))

alert("Dados salvos!")

}

function carregar(){

let dados=JSON.parse(localStorage.getItem("cadastro"))||[]

tabela.innerHTML=""

dados.forEach(d=>{

let linha=document.createElement("tr")

linha.innerHTML=`
<td contenteditable="true">${d.nome}</td>
<td contenteditable="true">${d.telefone}</td>
<td contenteditable="true">${d.cpf}</td>
<td contenteditable="true">${d.rg}</td>
<td contenteditable="true">${d.obs}</td>
<td><button class="excluir" onclick="excluir(this)">Excluir</button></td>
`

tabela.appendChild(linha)

})

}

function ordenar(){

let linhas=Array.from(document.querySelectorAll("#tabela tbody tr"))

linhas.sort((a,b)=>{

let A=a.children[0].innerText.toLowerCase()
let B=b.children[0].innerText.toLowerCase()

return A.localeCompare(B)

})

tabela.innerHTML=""

linhas.forEach(l=>tabela.appendChild(l))

}

carregar()

</script>

</body>
</html>
