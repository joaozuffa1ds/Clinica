<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Pessoas</title>
<style>
body { font-family: Arial; background: #f2f2f2; text-align: center; }
table { margin: 20px auto; border-collapse: collapse; width: 95%; background: white; }
th, td { border:1px solid #ccc; padding:10px; }
th { background:#2196f3; color:white; }
button { margin:10px 5px; padding:8px 15px; background:#2196f3; color:white; border:none; cursor:pointer; border-radius:4px; }
button:hover { background:#1976d2; }
.excluir { background:red; color:white; }
.excluir:hover { background:darkred; }
</style>
</head>
<body>

<h2>Cadastro de Pessoas</h2>
<button onclick="adicionar()">Adicionar Pessoa</button>
<button onclick="ordenar()">Ordenar por Nome</button>

<table id="tabela">
<thead>
<tr>
<th>Nome</th><th>Telefone</th><th>CPF</th><th>RG</th><th>Observação</th><th>Ação</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const senha = "14162130";
const tabela = document.querySelector("#tabela tbody");

function adicionar() {
  const s = prompt("Digite a senha para adicionar:");
  if(s===senha){
    const linha = document.createElement("tr");
    linha.innerHTML = `
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td>
        <button onclick="editar(this)">Salvar</button>
        <button class="excluir" onclick="remover(this)">Excluir</button>
      </td>
    `;
    tabela.appendChild(linha);
    salvar();
  } else alert("Senha incorreta!");
}

function editar(botao) {
  const linha = botao.parentElement.parentElement;
  if(botao.textContent==="Editar"){
    const s = prompt("Digite a senha para editar:");
    if(s===senha){
      linha.querySelectorAll("td").forEach((td,i)=>{if(i<5) td.contentEditable="true";});
      botao.textContent="Salvar";
    } else alert("Senha incorreta!");
  } else {
    linha.querySelectorAll("td").forEach((td,i)=>{if(i<5) td.contentEditable="false";});
    botao.textContent="Editar";
    salvar();
  }
}

function remover(botao){
  const s = prompt("Digite a senha para excluir:");
  if(s===senha){ botao.parentElement.parentElement.remove(); salvar(); }
  else alert("Senha incorreta!");
}

function salvar(){
  const dados = [];
  tabela.querySelectorAll("tr").forEach(linha=>{
    const col = linha.querySelectorAll("td");
    dados.push({
      nome: col[0].innerText.trim(),
      telefone: col[1].innerText.trim(),
      cpf: col[2].innerText.trim(),
      rg: col[3].innerText.trim(),
      obs: col[4].innerText.trim()
    });
  });
  localStorage.setItem("cadastro", JSON.stringify(dados));
}

function carregar(){
  const dados = JSON.parse(localStorage.getItem("cadastro"))||[];
  tabela.innerHTML="";
  dados.forEach(d=>{
    const linha=document.createElement("tr");
    linha.innerHTML=`
      <td contenteditable="false">${d.nome}</td>
      <td contenteditable="false">${d.telefone}</td>
      <td contenteditable="false">${d.cpf}</td>
      <td contenteditable="false">${d.rg}</td>
      <td contenteditable="false">${d.obs}</td>
      <td>
        <button onclick="editar(this)">Editar</button>
        <button class="excluir" onclick="remover(this)">Excluir</button>
      </td>
    `;
    tabela.appendChild(linha);
  });
}

function ordenar(){
  const linhas=Array.from(tabela.querySelectorAll("tr"));
  linhas.sort((a,b)=>a.children[0].innerText.toLowerCase().localeCompare(b.children[0].innerText.toLowerCase()));
  tabela.innerHTML="";
  linhas.forEach(l=>tabela.appendChild(l));
  salvar();
}

carregar();
</script>

</body>
</html>
