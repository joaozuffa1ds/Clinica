<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Cadastro de Pessoas com Senha</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
  }
  table {
    margin: 20px auto;
    border-collapse: collapse;
    width: 95%;
    background: white;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 10px;
  }
  th {
    background: #2196f3;
    color: white;
  }
  button {
    margin: 10px 5px;
    padding: 8px 15px;
    background: #2196f3;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover {
    background: #1976d2;
  }
  .excluir {
    background: red;
  }
  .excluir:hover {
    background: darkred;
  }
</style>
</head>
<body>

<h2>Cadastro de Pessoas</h2>

<button onclick="adicionar()">Adicionar Pessoa</button>
<button onclick="ordenar()">Ordenar por Nome</button>

<table id="tabela">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>CPF</th>
      <th>RG</th>
      <th>Observação</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const senha = "14162130";
const tabela = document.querySelector("#tabela tbody");

// Adicionar nova pessoa (precisa de senha)
function adicionar() {
  const senhaInput = prompt("Digite a senha para adicionar uma nova pessoa:");
  if (senhaInput === senha) {
    const linha = document.createElement("tr");
    linha.innerHTML = `
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td contenteditable="true"></td>
      <td>
        <button onclick="editar(this)">Salvar</button>
        <button class="excluir" onclick="remover(this)">Excluir</button>
      </td>
    `;
    tabela.appendChild(linha);
    salvar();
  } else {
    alert("Senha incorreta. Não foi possível adicionar.");
  }
}

// Editar linha (habilita edição ou salva)
function editar(botao) {
  const linha = botao.parentElement.parentElement;
  if (botao.textContent === "Editar") {
    const senhaInput = prompt("Digite a senha para editar esta pessoa:");
    if (senhaInput === senha) {
      linha.querySelectorAll("td").forEach((td, idx) => {
        if (idx < 5) td.contentEditable = "true";
      });
      botao.textContent = "Salvar";
    } else {
      alert("Senha incorreta. Não pode editar.");
    }
  } else {
    // Salvar edição
    linha.querySelectorAll("td").forEach((td, idx) => {
      if (idx < 5) td.contentEditable = "false";
    });
    botao.textContent = "Editar";
    salvar();
  }
}

// Excluir linha (precisa de senha)
function remover(botao) {
  const senhaInput = prompt("Digite a senha para excluir esta pessoa:");
  if (senhaInput === senha) {
    botao.parentElement.parentElement.remove();
    salvar();
  } else {
    alert("Senha incorreta. Não pode excluir.");
  }
}

// Salvar dados no LocalStorage
function salvar() {
  const dados = [];
  tabela.querySelectorAll("tr").forEach(linha => {
    const colunas = linha.querySelectorAll("td");
    dados.push({
      nome: colunas[0].innerText.trim(),
      telefone: colunas[1].innerText.trim(),
      cpf: colunas[2].innerText.trim(),
      rg: colunas[3].innerText.trim(),
      obs: colunas[4].innerText.trim()
    });
  });
  localStorage.setItem("cadastro", JSON.stringify(dados));
}

// Carregar dados do LocalStorage
function carregar() {
  let dados = JSON.parse(localStorage.getItem("cadastro")) || [];
  tabela.innerHTML = "";
  dados.forEach(d => {
    const linha = document.createElement("tr");
    linha.innerHTML = `
      <td contenteditable="false">${d.nome}</td>
      <td contenteditable="false">${d.telefone}</td>
      <td contenteditable="false">${d.cpf}</td>
      <td contenteditable="false">${d.rg}</td>
      <td contenteditable="false">${d.obs}</td>
      <td>
        <button onclick="editar(this)">Editar</button>
        <button class="excluir" onclick="remover(this)">Excluir</button>
      </td>
    `;
    tabela.appendChild(linha);
  });
}

// Ordenar tabela pelo nome (A-Z)
function ordenar() {
  const linhas = Array.from(tabela.querySelectorAll("tr"));
  linhas.sort((a, b) => {
    const nomeA = a.children[0].innerText.toLowerCase();
    const nomeB = b.children[0].innerText.toLowerCase();
    return nomeA.localeCompare(nomeB);
  });
  tabela.innerHTML = "";
  linhas.forEach(linha => tabela.appendChild(linha));
  salvar();
}

// Carrega os dados quando a página abre
carregar();
</script>

</body>
</html>
