<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mini Planilha</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

h1{
margin-top:20px;
}

table{
margin:auto;
border-collapse:collapse;
width:70%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#2c7be5;
color:white;
}

button{
margin:10px;
padding:8px 15px;
border:none;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5edb;
}
</style>
</head>

<body>

<h1>Mini Planilha</h1>

<button onclick="adicionarLinha()">Adicionar Linha</button>
<button onclick="ordenar()">Ordenar A-Z</button>
<button onclick="salvar()">Salvar</button>

<table id="tabela">
<thead>
<tr>
<th contenteditable="true">Nome</th>
<th contenteditable="true">Idade</th>
<th contenteditable="true">Cidade</th>
</tr>
</thead>

<tbody>

</tbody>
</table>

<script>

let tabela = document.querySelector("#tabela tbody")

function adicionarLinha(){

let linha = document.createElement("tr")

linha.innerHTML = `
<td contenteditable="true"></td>
<td contenteditable="true"></td>
<td contenteditable="true"></td>
`

tabela.appendChild(linha)

}

function salvar(){

let dados = []

document.querySelectorAll("#tabela tbody tr").forEach(linha => {

let colunas = linha.querySelectorAll("td")

dados.push({
nome: colunas[0].innerText,
idade: colunas[1].innerText,
cidade: colunas[2].innerText
})

})

localStorage.setItem("planilha", JSON.stringify(dados))

alert("Planilha salva!")

}

function carregar(){

let dados = JSON.parse(localStorage.getItem("planilha")) || []

tabela.innerHTML=""

dados.forEach(d => {

let linha = document.createElement("tr")

linha.innerHTML=`
<td contenteditable="true">${d.nome}</td>
<td contenteditable="true">${d.idade}</td>
<td contenteditable="true">${d.cidade}</td>
`

tabela.appendChild(linha)

})

}

function ordenar(){

let linhas = Array.from(document.querySelectorAll("#tabela tbody tr"))

linhas.sort((a,b)=>{

let A = a.children[0].innerText.toLowerCase()
let B = b.children[0].innerText.toLowerCase()

return A.localeCompare(B)

})

tabela.innerHTML=""

linhas.forEach(l=>tabela.appendChild(l))

}

carregar()

</script>

</body>
</html>
